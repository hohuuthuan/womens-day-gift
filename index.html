<!doctype html>
<html lang="vi" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc Mừng Ngày 8/3</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&amp;family=Quicksand:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="h-full font-quicksand">
  <div id="intro-screen"
    class="h-screen-fixed w-full flex flex-col items-center justify-center relative overflow-hidden"
    style="background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 50%, #fbcfe8 100%)">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="sparkle" style="top: 10%; left: 20%; background: #f472b6; border-radius: 50%"></div>
      <div class="sparkle" style="top: 30%; left: 80%; background: #ec4899; border-radius: 50%; animation-delay: 0.3s">
      </div>
      <div class="sparkle" style="top: 60%; left: 15%; background: #f9a8d4; border-radius: 50%; animation-delay: 0.6s">
      </div>
      <div class="sparkle" style="top: 80%; left: 70%; background: #fbcfe8; border-radius: 50%; animation-delay: 0.9s">
      </div>
      <div class="sparkle" style="top: 20%; left: 60%; background: #f472b6; border-radius: 50%; animation-delay: 1.2s">
      </div>

      <div class="floating-particle"
        style="width: 8px; height: 8px; background: rgba(236, 72, 153, 0.4); top: 15%; left: 10%; animation-delay: 0s">
      </div>
      <div class="floating-particle"
        style="width: 6px; height: 6px; background: rgba(244, 114, 182, 0.5); top: 25%; left: 75%; animation-delay: 1s">
      </div>
      <div class="floating-particle"
        style="width: 7px; height: 7px; background: rgba(251, 113, 133, 0.4); top: 70%; left: 85%; animation-delay: 2s">
      </div>
      <div class="floating-particle"
        style="width: 5px; height: 5px; background: rgba(236, 72, 153, 0.35); top: 45%; left: 5%; animation-delay: 1.5s">
      </div>

      <div class="glow-orb"
        style="width: 120px; height: 120px; background: rgba(236, 72, 153, 0.15); top: 5%; right: 10%; animation-delay: 0s">
      </div>
      <div class="glow-orb"
        style="width: 100px; height: 100px; background: rgba(244, 114, 182, 0.12); bottom: 10%; left: 15%; animation-delay: 1s">
      </div>
      <div class="glow-orb"
        style="width: 80px; height: 80px; background: rgba(251, 113, 133, 0.1); top: 50%; right: 5%; animation-delay: 2s">
      </div>

      <div class="drift-element"
        style="width: 4px; height: 4px; background: rgba(236, 72, 153, 0.6); top: 35%; left: 50%; border-radius: 50%; animation-delay: 0s">
      </div>
      <div class="drift-element"
        style="width: 3px; height: 3px; background: rgba(244, 114, 182, 0.5); top: 65%; left: 30%; border-radius: 50%; animation-delay: 1s">
      </div>
    </div>

    <div class="flex flex-col items-center gap-8 py-8">
      <p class="text-pink-600 text-lg font-medium tracking-wide instruction-text">✨ Nhấp vào hộp quà 3 lần để mở ✨</p>

      <div id="gift-box" class="relative cursor-pointer gift-float select-none" onclick="clickGift()">
        <div class="ribbon"></div>

        <div id="gift-lid" class="relative z-10 transition-all duration-500">
          <div class="w-48 h-12 rounded-lg shadow-lg"
            style="background: linear-gradient(135deg, #ec4899 0%, #db2777 100%)">
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-8 h-full" style="background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%)"></div>
            </div>
          </div>
        </div>

        <div id="gift-body" class="relative -mt-1">
          <div class="w-44 h-36 mx-auto rounded-lg shadow-2xl"
            style="background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%)">
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-8 h-full" style="background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 100%)"></div>
            </div>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
              <span class="text-6xl">🎀</span>
            </div>
          </div>
        </div>

        <div class="absolute -top-8 -left-8 text-3xl heart-beat" style="animation-delay: 0s">💕</div>
        <div class="absolute -top-4 -right-8 text-2xl heart-beat" style="animation-delay: 0.3s">💗</div>
        <div class="absolute -bottom-4 -left-6 text-2xl heart-beat" style="animation-delay: 0.6s">💖</div>
        <div class="absolute -bottom-8 -right-6 text-3xl heart-beat" style="animation-delay: 0.9s">💝</div>
      </div>

      <div id="click-counter" class="flex gap-3 justify-center">
        <div class="w-4 h-4 rounded-full bg-pink-200 border-2 border-pink-400 transition-all duration-300" id="dot1">
        </div>
        <div class="w-4 h-4 rounded-full bg-pink-200 border-2 border-pink-400 transition-all duration-300" id="dot2">
        </div>
        <div class="w-4 h-4 rounded-full bg-pink-200 border-2 border-pink-400 transition-all duration-300" id="dot3">
        </div>
      </div>
    </div>

    <p class="text-pink-500 font-dancing text-2xl">Một món quà đặc biệt dành cho bạn...</p>
  </div>

  <div id="wishes-screen" class="hidden w-full min-h-full overflow-auto wishes-bg relative snap-y-mandatory">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="twinkle-dot" style="top: 12%; left: 8%"></div>
      <div class="twinkle-dot" style="top: 22%; left: 84%; animation-delay: 0.5s"></div>
      <div class="twinkle-dot" style="top: 58%; left: 16%; animation-delay: 1.1s"></div>
      <div class="twinkle-dot" style="top: 72%; left: 74%; animation-delay: 0.9s"></div>
      <div class="twinkle-dot" style="top: 40%; left: 50%; animation-delay: 0.2s"></div>

      <div class="floating-heart" style="left: 10%; bottom: -20px; animation-delay: 0s">💗</div>
      <div class="floating-heart" style="left: 30%; bottom: -60px; animation-delay: 1.2s">💖</div>
      <div class="floating-heart" style="left: 55%; bottom: -40px; animation-delay: 0.6s">💝</div>
      <div class="floating-heart" style="left: 78%; bottom: -70px; animation-delay: 1.6s">💕</div>

      <div class="floating-particle"
        style="width: 6px; height: 6px; background: rgba(236, 72, 153, 0.3); top: 25%; left: 20%; animation-delay: 0s">
      </div>
      <div class="floating-particle"
        style="width: 5px; height: 5px; background: rgba(244, 114, 182, 0.35); top: 45%; left: 75%; animation-delay: 1.2s">
      </div>
      <div class="floating-particle"
        style="width: 7px; height: 7px; background: rgba(251, 113, 133, 0.3); top: 65%; left: 35%; animation-delay: 0.8s">
      </div>
      <div class="floating-particle"
        style="width: 4px; height: 4px; background: rgba(236, 72, 153, 0.25); top: 80%; left: 60%; animation-delay: 1.5s">
      </div>

      <div class="glow-orb"
        style="width: 100px; height: 100px; background: rgba(236, 72, 153, 0.08); top: 30%; right: 10%; animation-delay: 0.5s">
      </div>
      <div class="glow-orb"
        style="width: 80px; height: 80px; background: rgba(244, 114, 182, 0.07); bottom: 20%; left: 5%; animation-delay: 1.5s">
      </div>
    </div>

    <div class="soft-vignette"></div>
    <div id="screens-root" class="relative z-10"></div>
  </div>

  <button id="to-top" class="to-top" type="button" aria-label="Lên đầu trang">↑</button>
  <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50"></div>

  <script src="./app.js"></script>
</body>

</html>
