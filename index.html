<!doctype html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc Mừng Ngày 8/3</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&amp;family=Quicksand:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    .font-dancing { font-family: "Dancing Script", cursive; }
    .font-quicksand { font-family: "Quicksand", sans-serif; }

    /* ===== Mobile viewport fix (address bar / 100vh issue) ===== */
    :root{
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
      --screen1-head-gap: clamp(10px, 2.5vh, 18px);
    }
    .h-screen-fixed { min-height: 100vh; min-height: 100dvh; }

    /* Intro animations */
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg) }
      50% { transform: translateY(-20px) rotate(5deg) }
    }
    @keyframes shake {
      0%, 100% { transform: rotate(-5deg) }
      25% { transform: rotate(-15deg) scale(1.1) }
      50% { transform: rotate(5deg) scale(1.05) }
      75% { transform: rotate(-10deg) scale(1.1) }
    }
    @keyframes explode {
      0% { transform: scale(1) rotate(0); opacity: 1 }
      50% { transform: scale(1.5) rotate(180deg); opacity: .8 }
      100% { transform: scale(3) rotate(360deg); opacity: 0 }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0) }
      50% { opacity: 1; transform: scale(1) rotate(180deg) }
    }
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0); opacity: 1 }
      100% { transform: translateY(100px) rotate(720deg); opacity: 0 }
    }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1) }
      25% { transform: scale(1.1) }
      50% { transform: scale(1) }
      75% { transform: scale(1.15) }
    }

    .gift-float { animation: float 3s ease-in-out infinite }
    .gift-shake { animation: shake .5s ease-in-out }
    .gift-explode { animation: explode 1s ease-out forwards }
    .sparkle { position: absolute; width: 20px; height: 20px; animation: sparkle 1.5s ease-in-out infinite }
    .confetti-piece { position: absolute; width: 10px; height: 10px; animation: confetti 2s ease-out forwards }
    .heart-beat { animation: heartBeat 1.5s ease-in-out infinite }

    /* Ribbon */
    .ribbon { position: absolute; width: 30px; height: 80px; top: -40px; left: 50%; transform: translateX(-50%) }
    .ribbon::before,
    .ribbon::after {
      content: "";
      position: absolute;
      width: 30px;
      height: 40px;
      background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
      border-radius: 0 0 50% 50%;
    }
    .ribbon::before { left: -15px; transform: rotate(-20deg) }
    .ribbon::after { right: -15px; transform: rotate(20deg) }

    /* ===== Wishes styling ===== */
    .gradient-text {
      background: linear-gradient(135deg, #ec4899, #f472b6, #fb7185);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .wishes-bg {
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(236, 72, 153, 0.18), transparent 55%),
        radial-gradient(800px 450px at 85% 20%, rgba(244, 114, 182, 0.18), transparent 55%),
        radial-gradient(900px 500px at 50% 95%, rgba(251, 113, 133, 0.14), transparent 60%),
        linear-gradient(180deg, #fdf2f8 0%, #fce7f3 45%, #fff1f2 100%);
    }

    .soft-vignette {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 35%, rgba(131, 24, 67, .05) 78%, rgba(131, 24, 67, .08) 100%);
      mix-blend-mode: multiply;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(236, 72, 153, .18);
      box-shadow: 0 18px 40px rgba(236, 72, 153, .08);
    }

    .twinkle-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(236, 72, 153, .35);
      box-shadow: 0 0 18px rgba(244, 114, 182, .35);
      animation: twinkle 2.4s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { transform: scale(.7); opacity: .25 }
      50% { transform: scale(1.25); opacity: .6 }
    }

    .floating-heart {
      position: absolute;
      font-size: 22px;
      opacity: .35;
      filter: drop-shadow(0 10px 18px rgba(236, 72, 153, .16));
      animation: floatHearts 8s linear infinite;
    }
    @keyframes floatHearts {
      0% { transform: translateY(30px) translateX(0) rotate(0); opacity: 0 }
      10% { opacity: .35 }
      70% { opacity: .35 }
      100% { transform: translateY(-420px) translateX(40px) rotate(220deg); opacity: 0 }
    }

    /* Card */
    .wish-card {
      position: relative;
      border-radius: 1.25rem;
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .wish-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 25px 50px -12px rgba(236, 72, 153, .35);
    }
    .wish-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 1.35rem;
      background: linear-gradient(135deg, rgba(236, 72, 153, .35), rgba(244, 114, 182, .22), rgba(251, 113, 133, .2));
      z-index: 0;
      opacity: .75;
    }
    .wish-card > .card-inner {
      position: relative;
      z-index: 1;
      border-radius: 1.2rem;
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(236, 72, 153, .12);
    }

    .shine {
      position: absolute;
      inset: 0;
      border-radius: 1.2rem;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }
    .shine::after {
      content: "";
      position: absolute;
      top: -60%;
      left: -40%;
      width: 60%;
      height: 220%;
      transform: rotate(25deg);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .55), transparent);
      opacity: 0;
      transition: opacity .25s ease;
    }
    .wish-card:hover .shine::after {
      opacity: 1;
      animation: shineMove .9s ease-in-out forwards;
    }
    @keyframes shineMove {
      from { transform: translateX(0) rotate(25deg) }
      to { transform: translateX(260%) rotate(25deg) }
    }

    /* Scroll snap */
    .snap-y-mandatory { scroll-snap-type: y mandatory; scroll-behavior: smooth }
    .snap-start { scroll-snap-align: start }

    .screen {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 16px;
      position: relative;
    }

    /* tighter padding on mobile for narrow 21:9 */
    @media (max-width: 767px) {
      .screen { padding: 0px 8px; }
    }

    .screen-inner { width: 100%; max-width: 72rem; margin: 0 auto }

    .cards-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 18px;
    }
    @media (min-width:768px) {
      .cards-2 {
        grid-template-columns: 1fr 1fr;
        gap: 22px;
      }
    }

    /* ===== KEY FIX 1: Title always 1 line on narrow width ===== */
    .one-line-title{
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(30px, 8.8vw, 64px);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    @media (max-width: 360px){
      .one-line-title{
        font-size: clamp(26px, 8.2vw, 52px);
        letter-spacing: -0.03em;
      }
    }

    /* ===== KEY FIX 2: Screen 1 vertical centering from badge -> 2 first cards ===== */
    .screen.screen-1 .screen-inner{
      min-height: calc(100dvh - 112px); /* 56px * 2 (desktop padding); mobile still OK */
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    @media (max-width: 767px){
      .screen.screen-1 .screen-inner{
        min-height: calc(100dvh - 88px); /* 44px*2 for mobile */
      }
    }
    .screen.screen-1 header{ margin-bottom: var(--screen1-head-gap); }
    .screen.screen-1 .cards-2{ margin-top: var(--screen1-head-gap); }

    /* Letter */
    .letter-paper {
      position: relative;
      border-radius: 24px;
      background:
        radial-gradient(1200px 200px at 50% -20%, rgba(236, 72, 153, .18), transparent 55%),
        linear-gradient(180deg, rgba(255, 255, 255, .95), rgba(255, 255, 255, .88));
      border: 1px solid rgba(236, 72, 153, .14);
      box-shadow: 0 30px 80px rgba(236, 72, 153, .18), 0 10px 22px rgba(236, 72, 153, .10);
      padding: 26px 22px;
    }
    @media (min-width:768px) { .letter-paper { padding: 34px 34px } }

    .letter-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(236, 72, 153, .22), transparent);
      margin: 16px 0;
    }
    .letter-stamp {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(236, 72, 153, .18), rgba(244, 114, 182, .12));
      border: 1px dashed rgba(236, 72, 153, .28);
      display: grid;
      place-items: center;
      transform: rotate(8deg);
    }
    .letter-sign { margin-top: 18px; text-align: right }

    .instruction-text {
      padding: 20px;
    }

    /* Arrows */
    .nav-arrow {
      position: absolute;
      left: 50%;
      width: 60px;
      height: 60px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(236, 72, 153, .18);
      box-shadow: 0 18px 45px rgba(236, 72, 153, .16);
      color: #be185d;
      cursor: pointer;
      user-select: none;
    }
    .nav-arrow:active { transform: translateX(-50%) scale(.95) }
    .nav-arrow .chev { font-size: 24px; }

    .nav-arrow.down {
      bottom: calc(14px + var(--safe-bottom));
      transform: translateX(-50%);
    }
    .nav-arrow.up {
      top: calc(14px + var(--safe-top));
      transform: translateX(-50%);
    }

    /* Back to top */
    .to-top {
      position: fixed;
      right: 14px;
      bottom: calc(14px + var(--safe-bottom));
      z-index: 40;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .80);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(236, 72, 153, .18);
      box-shadow: 0 18px 45px rgba(236, 72, 153, .18);
      color: #be185d;
      transition: transform .2s ease, opacity .2s ease;
      opacity: 0;
      pointer-events: none;
    }
    .to-top.show { opacity: 1; pointer-events: auto }
    .to-top:active { transform: scale(.95) }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px }
    ::-webkit-scrollbar-track { background: #fce7f3 }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #ec4899, #f472b6); border-radius: 4px }

    /* Reduce motion for performance */
    @media (prefers-reduced-motion: reduce){
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
      .gift-float, .heart-beat, .sparkle, .floating-heart, .twinkle-dot { animation: none !important; }
    }
  </style>
</head>

<body class="h-full font-quicksand">
  <!-- Intro -->
  <div id="intro-screen" class="h-screen-fixed w-full flex flex-col items-center justify-center relative overflow-hidden"
    style="background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 50%, #fbcfe8 100%)">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="sparkle" style="top: 10%; left: 20%; background: #f472b6; border-radius: 50%"></div>
      <div class="sparkle" style="top: 30%; left: 80%; background: #ec4899; border-radius: 50%; animation-delay: 0.3s"></div>
      <div class="sparkle" style="top: 60%; left: 15%; background: #f9a8d4; border-radius: 50%; animation-delay: 0.6s"></div>
      <div class="sparkle" style="top: 80%; left: 70%; background: #fbcfe8; border-radius: 50%; animation-delay: 0.9s"></div>
      <div class="sparkle" style="top: 20%; left: 60%; background: #f472b6; border-radius: 50%; animation-delay: 1.2s"></div>
    </div>

    <div class="flex flex-col items-center gap-8 py-8">
      <p class="text-pink-600 text-lg font-medium tracking-wide instruction-text">✨ Nhấp vào hộp quà 3 lần để mở ✨</p>

      <div id="gift-box" class="relative cursor-pointer gift-float select-none" onclick="clickGift()">
        <div class="ribbon"></div>

        <div id="gift-lid" class="relative z-10 transition-all duration-500">
          <div class="w-48 h-12 rounded-lg shadow-lg"
            style="background: linear-gradient(135deg, #ec4899 0%, #db2777 100%)">
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-8 h-full" style="background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%)"></div>
            </div>
          </div>
        </div>

        <div id="gift-body" class="relative -mt-1">
          <div class="w-44 h-36 mx-auto rounded-lg shadow-2xl"
            style="background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%)">
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-8 h-full" style="background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 100%)"></div>
            </div>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
              <span class="text-6xl">🎀</span>
            </div>
          </div>
        </div>

        <div class="absolute -top-8 -left-8 text-3xl heart-beat" style="animation-delay: 0s">💕</div>
        <div class="absolute -top-4 -right-8 text-2xl heart-beat" style="animation-delay: 0.3s">💗</div>
        <div class="absolute -bottom-4 -left-6 text-2xl heart-beat" style="animation-delay: 0.6s">💖</div>
        <div class="absolute -bottom-8 -right-6 text-3xl heart-beat" style="animation-delay: 0.9s">💝</div>
      </div>

      <div id="click-counter" class="flex gap-3 justify-center">
        <div class="w-4 h-4 rounded-full bg-pink-200 border-2 border-pink-400 transition-all duration-300" id="dot1"></div>
        <div class="w-4 h-4 rounded-full bg-pink-200 border-2 border-pink-400 transition-all duration-300" id="dot2"></div>
        <div class="w-4 h-4 rounded-full bg-pink-200 border-2 border-pink-400 transition-all duration-300" id="dot3"></div>
      </div>
    </div>

    <p class="text-pink-500 font-dancing text-2xl">Một món quà đặc biệt dành cho bạn...</p>
  </div>

  <!-- Wishes -->
  <div id="wishes-screen" class="hidden w-full min-h-full overflow-auto wishes-bg relative snap-y-mandatory">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="twinkle-dot" style="top: 12%; left: 8%"></div>
      <div class="twinkle-dot" style="top: 22%; left: 84%; animation-delay: 0.5s"></div>
      <div class="twinkle-dot" style="top: 58%; left: 16%; animation-delay: 1.1s"></div>
      <div class="twinkle-dot" style="top: 72%; left: 74%; animation-delay: 0.9s"></div>
      <div class="twinkle-dot" style="top: 40%; left: 50%; animation-delay: 0.2s"></div>

      <div class="floating-heart" style="left: 10%; bottom: -20px; animation-delay: 0s">💗</div>
      <div class="floating-heart" style="left: 30%; bottom: -60px; animation-delay: 1.2s">💖</div>
      <div class="floating-heart" style="left: 55%; bottom: -40px; animation-delay: 0.6s">💝</div>
      <div class="floating-heart" style="left: 78%; bottom: -70px; animation-delay: 1.6s">💕</div>
    </div>

    <div class="soft-vignette"></div>
    <div id="screens-root" class="relative z-10"></div>
  </div>

  <button id="to-top" class="to-top" type="button" aria-label="Lên đầu trang">↑</button>
  <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50"></div>

  <script>
    // Optional: better 100vh on mobile browsers (kept minimal)
    (function() {
      const setVH = () => {
        document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
      };
      setVH();
      window.addEventListener('resize', setVH);
    })();

    const wishes = [
      { icon: "💖", title: "Xinh Đẹp Mãi", message: "Chúc bạn luôn xinh đẹp, tự tin và tỏa sáng theo cách riêng rực rỡ nhất!", color: "from-rose-400 to-pink-500" },
      { icon: "💝", title: "Hạnh Phúc Viên Mãn", message: "Mong bạn luôn được yêu thương, chở che và có cuộc sống hạnh phúc trọn vẹn!", color: "from-pink-400 to-rose-500" },
      { icon: "✨", title: "Thành Công Rực Rỡ", message: "Chúc bạn gặt hái nhiều thành công trong công việc và cuộc sống!", color: "from-amber-400 to-orange-500" },
      { icon: "💪", title: "Sức Khỏe Dồi Dào", message: "Chúc bạn luôn khỏe mạnh, tràn đầy năng lượng để theo đuổi ước mơ!", color: "from-green-400 to-emerald-500" },
      { icon: "💕", title: "Tình Yêu Ngọt Ngào", message: "Mong bạn luôn được yêu thương và trân trọng bởi những người xung quanh!", color: "from-red-400 to-pink-500" },
      { icon: "🎀", title: "May Mắn Luôn Bên", message: "Chúc mọi điều tốt đẹp nhất sẽ đến với bạn trong những ngày sắp tới!", color: "from-purple-400 to-pink-500" },
      { icon: "😊", title: "Niềm Vui Mỗi Ngày", message: "Mong mỗi ngày của bạn đều tràn ngập tiếng cười và những điều dễ thương!", color: "from-fuchsia-400 to-pink-500" },
      { icon: "🦋", title: "Tự Do Bay Cao", message: "Chúc bạn luôn tự do theo đuổi đam mê và sống đúng với chính mình!", color: "from-sky-400 to-indigo-500" },
      { icon: "🌟", title: "Tỏa Sáng Rực Rỡ", message: "Bạn là ngôi sao sáng nhất — hãy tiếp tục tỏa sáng và truyền cảm hứng!", color: "from-yellow-400 to-amber-500" },
      { icon: "🍀", title: "An Lành Bình Yên", message: "Chúc bạn luôn bình an, thanh thản và tìm thấy sự cân bằng trong cuộc sống!", color: "from-teal-400 to-green-500" }
    ];

    const specialLetter = {
      title: "Lời Chúc Đặc Biệt",
      to: "Gửi bạn,",
      body: [
        "Hôm nay là ngày 8/3 — mình chỉ muốn nhắc bạn rằng bạn thật sự tuyệt vời.",
        "Cảm ơn vì đã luôn cố gắng, luôn dịu dàng theo cách riêng, và vẫn giữ cho trái tim mình ấm áp.",
        "Mong bạn sẽ luôn được yêu thương, được trân trọng, và có thật nhiều ngày bình yên.",
        "Nếu có lúc mệt, hãy nghỉ một chút… rồi lại tiếp tục tỏa sáng nhé ✨"
      ],
      from: "Thương mến,"
    };

    let clickCount = 0;
    let isOpening = false;

    function clickGift() {
      if (isOpening) return;

      clickCount++;
      const giftBox = document.getElementById("gift-box");
      const dots = [dot1, dot2, dot3];

      if (clickCount <= 3) {
        dots[clickCount - 1].classList.remove("bg-pink-200");
        dots[clickCount - 1].classList.add("bg-pink-500", "scale-125");
      }

      giftBox.classList.remove("gift-float");
      giftBox.classList.add("gift-shake");
      setTimeout(() => {
        giftBox.classList.remove("gift-shake");
        if (clickCount < 3) giftBox.classList.add("gift-float");
      }, 500);

      if (clickCount === 3) {
        isOpening = true;
        setTimeout(openGift, 600);
      }
    }

    function openGift() {
      const introScreen = document.getElementById("intro-screen");
      const giftBox = document.getElementById("gift-box");
      const giftLid = document.getElementById("gift-lid");

      giftLid.style.transform = "translateY(-50px) rotate(-30deg)";
      giftLid.style.opacity = "0";

      createConfetti();
      setTimeout(() => giftBox.classList.add("gift-explode"), 500);

      setTimeout(() => {
        introScreen.style.transition = "opacity 0.8s ease-out";
        introScreen.style.opacity = "0";

        setTimeout(() => {
          introScreen.classList.add("hidden");
          const ws = document.getElementById("wishes-screen");
          ws.classList.remove("hidden");
          renderScreens();
          setupToTop(ws);
        }, 800);
      }, 1200);
    }

    function createConfetti() {
      const container = document.getElementById("confetti-container");
      const colors = ["#ec4899", "#f472b6", "#f9a8d4", "#fbcfe8", "#fdf2f8", "#ff6b9d", "#ff85a1"];
      const shapes = ["🎀", "💕", "✨", "💗", "🎉", "💖", "⭐"];

      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti-piece";
        confetti.style.left = Math.random() * 100 + "%";
        confetti.style.top = Math.random() * 50 + "%";
        confetti.style.animationDelay = Math.random() * 0.5 + "s";
        confetti.style.animationDuration = (Math.random() * 1 + 1.5) + "s";

        if (Math.random() > 0.5) {
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        } else {
          confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
          confetti.style.fontSize = (Math.random() * 20 + 10) + "px";
          confetti.style.background = "none";
        }
        container.appendChild(confetti);
      }

      setTimeout(() => (container.innerHTML = ""), 3000);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderWishCardHTML(wish) {
      return `
        <div class="wish-card p-[1px] shadow-xl relative overflow-hidden">
          <div class="card-inner rounded-2xl p-6 relative overflow-hidden">
            <div class="shine"></div>
            <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${wish.color} opacity-10 rounded-full -translate-y-1/2 translate-x-1/2"></div>

            <div class="relative z-10">
              <div class="flex items-center gap-4 mb-4">
                <span class="text-5xl">${wish.icon}</span>
                <h3 class="font-dancing text-3xl" style="color:#ec4899">${escapeHtml(wish.title)}</h3>
              </div>

              <p class="text-lg leading-relaxed" style="color:#831843">${escapeHtml(wish.message)}</p>

              <div class="mt-4 flex flex-wrap gap-2">
                <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium"
                  style="background-color: rgba(244,114,182,.12); color:#ec4899">
                  ✨ #8Tháng3
                </span>
                <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium"
                  style="background-color: rgba(244,114,182,.12); color:#ec4899">
                  💗 #NgàyCủaPhụNữ
                </span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderScreens() {
      const root = document.getElementById("screens-root");
      root.innerHTML = "";

      const pairs = [];
      for (let i = 0; i < wishes.length; i += 2) pairs.push(wishes.slice(i, i + 2));

      const makeArrow = (type, onClick) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `nav-arrow ${type}`;
        btn.setAttribute("aria-label", type === "down" ? "Cuộn xuống" : "Cuộn lên");
        btn.innerHTML = `<span class="chev">${type === "down" ? "⌄" : "⌃"}</span>`;
        btn.addEventListener("click", onClick);
        return btn;
      };

      pairs.forEach((pair, idx) => {
        const screen = document.createElement("section");
        screen.className = `screen snap-start ${idx === 0 ? "screen-1" : ""}`;
        screen.id = `screen-${idx + 1}`;

        const inner = document.createElement("div");
        inner.className = "screen-inner";

        if (idx === 0) {
          inner.innerHTML = `
            <header class="text-center">
              <div class="header-badge mx-auto mb-5">
                <span class="text-xl heart-beat">💗</span>
                <span class="text-pink-700 font-medium tracking-wide">International Women's Day</span>
                <span class="text-xl heart-beat" style="animation-delay:.25s">💖</span>
              </div>

              <h1 class="font-dancing gradient-text one-line-title mb-3">Chúc Mừng Ngày 8/3</h1>
              <p class="text-pink-700 text-lg md:text-2xl font-medium">💝 Gửi đến những người phụ nữ tuyệt vời nhất 💝</p>

              <div class="mt-5 flex items-center justify-center gap-3 opacity-90">
                <span class="h-px w-10 bg-pink-300/70"></span>
                <span class="text-pink-600">❤</span>
                <span class="h-px w-10 bg-pink-300/70"></span>
              </div>
            </header>
          `;
        }

        const cardsWrap = document.createElement("div");
        cardsWrap.className = "cards-2";
        cardsWrap.innerHTML = pair.map(renderWishCardHTML).join("");
        inner.appendChild(cardsWrap);

        screen.appendChild(inner);

        // DOWN: go to next screen or letter
        screen.appendChild(
          makeArrow("down", () => {
            const nextId = idx + 1 < pairs.length ? `screen-${idx + 2}` : "screen-letter";
            document.getElementById(nextId)?.scrollIntoView({ behavior: "smooth", block: "start" });
          })
        );

        // UP: from screen 2 onward
        if (idx >= 1) {
          screen.appendChild(
            makeArrow("up", () => {
              const prevId = idx - 1 >= 0 ? `screen-${idx}` : "screen-1";
              document.getElementById(prevId)?.scrollIntoView({ behavior: "smooth", block: "start" });
            })
          );
        }

        root.appendChild(screen);
      });

      // Letter screen
      const letter = document.createElement("section");
      letter.className = "screen snap-start";
      letter.id = "screen-letter";
      letter.innerHTML = `
        <div class="screen-inner">
          <div class="letter-paper">
            <div class="letter-stamp">💌</div>

            <div class="text-center mb-3">
              <h2 class="font-dancing text-5xl md:text-6xl gradient-text">${escapeHtml(specialLetter.title)}</h2>
              <p class="text-pink-700 mt-2 opacity-90">Một chút dịu dàng, dành riêng cho bạn</p>
            </div>

            <div class="letter-line"></div>

            <div class="text-lg leading-relaxed" style="color:#831843">
              <p class="font-medium mb-3">${escapeHtml(specialLetter.to)}</p>
              ${specialLetter.body.map((p) => `<p class="mb-3">${escapeHtml(p)}</p>`).join("")}
            </div>

            <div class="letter-line"></div>

            <div class="letter-sign" style="color:#ec4899">
              <p class="font-medium">${escapeHtml(specialLetter.from)}</p>
              <p class="font-dancing text-3xl mt-1">💖</p>
            </div>

            <div class="mt-6 text-center text-sm text-pink-600/90">
              Made with 💕 for International Women's Day
            </div>
          </div>
        </div>
      `;

      // Letter: up to last pair screen
      letter.appendChild(
        (() => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "nav-arrow up";
          btn.setAttribute("aria-label", "Cuộn lên");
          btn.innerHTML = `<span class="chev">⌃</span>`;
          btn.addEventListener("click", () => {
            const lastPair = Math.ceil(wishes.length / 2);
            document.getElementById(`screen-${lastPair}`)?.scrollIntoView({ behavior: "smooth", block: "start" });
          });
          return btn;
        })()
      );

      root.appendChild(letter);
    }

    function setupToTop(scrollEl) {
      const toTop = document.getElementById("to-top");
      const onScroll = () => {
        const y = scrollEl.scrollTop;
        if (y > 400) toTop.classList.add("show");
        else toTop.classList.remove("show");
      };
      scrollEl.addEventListener("scroll", onScroll);

      toTop.addEventListener("click", () => {
        scrollEl.scrollTo({ top: 0, behavior: "smooth" });
      });
    }
  </script>
</body>
</html>
